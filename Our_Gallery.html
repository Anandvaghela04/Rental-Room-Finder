<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Rental Room Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .gallery-container {
            padding: 50px 0;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container text-center gallery-container">
        <h1 class="mb-4">Our Gallery</h1>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="gallery-item">
                    <img src="a_1.avif" alt="Room 1">
                </div>
            </div>
            <div class="col-md-4">
                <div class="gallery-item">
                    <img src="a_1.avif" alt="Room 2">
                </div>
            </div>
            <div class="col-md-4">
                <div class="gallery-item">
                    <img src="a_1.avif" alt="Room 3">
                </div>
            </div>
            <div class="col-md-4">
                <div class="gallery-item">
                    <img src="a_1.avif" alt="Room 4">
                </div>
            </div>
            <div class="col-md-4">
                <div class="gallery-item">
                    <img src="a_1.avif" alt="Room 5">
                </div>
            </div>
            <div class="col-md-4">
                <div class="gallery-item">
                    <img src="a_1.avif" alt="Room 6">
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
