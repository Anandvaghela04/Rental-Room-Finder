<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Rental Room Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #eef2f3;
        }
        .contact-container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
            margin-top: 50px;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .btn-custom {
            background: linear-gradient(to right, #007bff, #6610f2);
            color: white;
            font-weight: bold;
            border-radius: 8px;
        }
        .btn-custom:hover {
            background: linear-gradient(to right, #6610f2, #007bff);
        }
        .contact-info {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="contact-container">
            <h2 class="text-center mb-4">Get in Touch</h2>
            <p class="text-center text-muted">We would love to hear from you! Fill out the form below and we'll get back to you soon.</p>
            <form>
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="example@mail.com" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="number" class="form-control" id="phone" placeholder="(123) 456-7890" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Your Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="Type your message here..." required></textarea>
                </div>
                <button type="submit" class="btn btn-custom w-100">Send Message</button>
            </form>
            <div class="contact-info">
                <p class="mt-3">📍 123 Rental Street, City, Country</p>
                <p>📧 contact@rentalroomfinder.com</p>
                <p>📞 +123 456 7890</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
